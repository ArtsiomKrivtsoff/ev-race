      <a class="nav-link" href="/">ГЛАВНАЯ</a>
      <a class="nav-link" href="https://evrace.by/tour.html">ТУРНИРНАЯ ТАБЛИЦА</a>
      <a class="nav-link active" href="#">КАРТА</a>
      <a class="nav-link" href="https://evrace.by/stations.html">СТАНЦИИ 2026</a>
    </div>
    <div class="theme-seg">
      <button class="theme-seg-btn active" id="btn-arcade"      onclick="setTheme('arcade')">⬡ ARCADE</button>
      <button class="theme-seg-btn"        id="btn-tesla-light" onclick="setTheme('tesla-light')">&#x2600; TESLA</button>
      <button class="theme-seg-btn"        id="btn-tesla-dark"  onclick="setTheme('tesla-dark')">&#x25D1; TESLA</button>
    </div>
  </div>

  <div class="nav-mobile-drop" id="mobileMenu">
    <a class="nav-mobile-link" href="/" onclick="closeBurger()">ГЛАВНАЯ</a>
    <a class="nav-mobile-link" href="https://evrace.by/tour.html" onclick="closeBurger()">ТУРНИРНАЯ ТАБЛИЦА</a>
    <a class="nav-mobile-link active" href="#" onclick="closeBurger()">КАРТА</a>
    <a class="nav-mobile-link" href="https://evrace.by/stations.html" onclick="closeBurger()">СТАНЦИИ 2026</a>
  </div>

  <div class="page-wrap">

    <div id="map"></div>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="map-top">
      <div class="map-top-bar">
        <button class="map-type-btn on" data-type="DC"   onclick="toggleType(this)">DC</button>
        <button class="map-type-btn on" data-type="AC"   onclick="toggleType(this)">AC</button>
        <button class="map-type-btn on" data-type="ACDC" onclick="toggleType(this)">ACDC</button>
        <button class="map-heat-btn" id="heatBtn" onclick="toggleHeat()">ТЕПЛО</button>
        <button class="map-geo-btn"  onclick="locateMe()">&#x25CE;</button>
        <button class="map-reset-btn" onclick="resetFilters()">&#x2715;</button>
        <span class="map-badge" id="map-badge">...</span>
      </div>
    </div>

    <!-- ЗУМ -->
    <div class="map-zoom">
      <button class="map-zoom-btn" onclick="map.zoomIn()">+</button>
      <button class="map-zoom-btn" onclick="map.zoomOut()">&#x2212;</button>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="map-bottom">
      <div class="map-bottom-bar">
        <div class="map-slider-row">
          <span class="map-slider-label" id="slider-label">ЯНВ</span>
          <input class="map-slider" type="range" id="time-slider" min="0" max="11" value="11" oninput="onSlider(this.value)">
          <span class="map-slider-label">ДЕК</span>
          <button class="map-play-btn" id="playBtn" onclick="togglePlay()">&#x25BA;</button>
        </div>
        <div class="map-ops-row">
          <button class="map-op-btn op-bf on" data-op="batteryfly" onclick="toggleOp(this)" style="background:#005EEB;color:#fff;border-color:#005EEB;">BatteryFly</button>
          <button class="map-op-btn op-fo on" data-op="forevo"     onclick="toggleOp(this)" style="background:#b44fff;color:#fff;border-color:#b44fff;">forEVo</button>
          <button class="map-op-btn op-za on" data-op="zaryadka"   onclick="toggleOp(this)" style="background:#00cfff;color:#003;border-color:#00cfff;">Zaryadka</button>
          <button class="map-op-btn op-uc on" data-op="united"     onclick="toggleOp(this)" style="background:#F5821F;color:#fff;border-color:#F5821F;">United</button>
          <button class="map-op-btn op-cs on" data-op="csms"       onclick="toggleOp(this)" style="background:#FF6B6B;color:#fff;border-color:#FF6B6B;">ЦСМС</button>
          <button class="map-op-btn op-ma on" data-op="malanka"    onclick="toggleOp(this)" style="background:#76d275;color:#003;border-color:#76d275;">Malanka</button>
          <button class="map-op-btn op-ev on" data-op="evika"      onclick="toggleOp(this)" style="background:#832af5;color:#fff;border-color:#832af5;">Evika!</button>
          <button class="map-op-btn op-or on" data-op="orange"     onclick="toggleOp(this)" style="background:#FF6B00;color:#fff;border-color:#FF6B00;">Orange</button>
          <button class="map-op-btn op-pr on" data-op="prizma"     onclick="toggleOp(this)" style="background:#24c3d3;color:#003;border-color:#24c3d3;">Prizma</button>
        </div>
        <div class="map-caption">На карте зарядные станции, запущенные в Беларуси в 2026 году</div>
      </div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
const SURL='https://uvrboxrddqlasgrnnnne.supabase.co';
const SKEY='sb_publishable_Tmx9z-PHntDW4cZQrhOTHQ_1R1Bns7Y';

const OP_COLORS={batteryfly:'#005EEB',forevo:'#b44fff',zaryadka:'#00cfff',united:'#F5821F',csms:'#FF6B6B',malanka:'#76d275',evika:'#832af5',orange:'#FF6B00',prizma:'#24c3d3'};
const OP_NAMES={batteryfly:'BatteryFly',forevo:'forEVo',zaryadka:'Zaryadka',united:'United Company',csms:'Гродн. ЦСМС',malanka:'Malanka',evika:'Evika!',orange:'Orange',prizma:'Prizma'};
const OP_DARK=['zaryadka','malanka','prizma'];
const TILES={'arcade':'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png','tesla-light':'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png','tesla-dark':'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'};
const MONTHS=['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН','ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];

const activeOps=new Set(Object.keys(OP_COLORS));
const activeTypes=new Set(['DC','AC','ACDC']);
let allStations=[],sliderMonth=11,heatMode=false,playInterval=null,geoMarker=null,heatLayer=null;

const map=L.map('map',{center:[53.7,28.0],zoom:7,zoomControl:false,scrollWheelZoom:true});
let tileLayer=L.tileLayer(TILES['arcade'],{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',maxZoom:19}).addTo(map);
const clusterGroup=L.markerClusterGroup({maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false,zoomToBoundsOnClick:true});
map.addLayer(clusterGroup);

function makeIcon(color){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="22" viewBox="0 0 16 22"><path d="M8 0C3.6 0 0 3.6 0 8c0 6.3 8 14 8 14s8-7.7 8-14C16 3.6 12.4 0 8 0z" fill="${color}" stroke="#fff" stroke-width="1.2"/><circle cx="8" cy="8" r="3" fill="#fff" fill-opacity=".85"/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[16,22],iconAnchor:[8,22],popupAnchor:[0,-24]});
}

const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function buildRoute(lat,lng,name){
  if(/iPad|iPhone|iPod/.test(navigator.userAgent)) window.open(`maps://maps.apple.com/?daddr=${lat},${lng}`);
  else window.open(`geo:${lat},${lng}?q=${lat},${lng}(${encodeURIComponent(name)})`);
}

function makePopup(s){
  const color=OP_COLORS[s.operator]||'#00ff41';
  const opName=OP_NAMES[s.operator]||s.operator;
  const dc=s.dc_power?`DC ${s.dc_power} кВт`:'';
  const ac=s.ac_power?`AC ${s.ac_power} кВт`:'';
  const pwr=[dc,ac].filter(Boolean).join(' · ')||'—';
  const guns=[s.gun1_type,s.gun2_type,s.gun3_type].filter(Boolean).join(' · ')||'—';
  const date=s.station_date?s.station_date.slice(0,10).split('-').reverse().join('.'):'—';
  const addr=[s.city,s.address].filter(Boolean).join(', ');
  const btn=isMobile?`<button class="popup-route-btn" style="background:${color}" onclick="buildRoute(${s.lat},${s.lng},'${opName.replace(/'/g,"\\'")}')">&#x25BA; МАРШРУТ</button>`:'';
  return `<div class="popup-wrap"><div class="popup-op" style="color:${color}">${opName}</div><div class="popup-row">&#x1F4CD; <span>${addr}</span></div><div class="popup-row">&#x26A1; <span>${pwr}</span></div><div class="popup-row">&#x1F50C; <span>${guns}</span></div><div class="popup-row">&#x1F4C5; <span>${date}</span></div>${btn}</div>`;
}

function getFiltered(){
  const cutoff=new Date(2026,sliderMonth+1,0);
  return allStations.filter(s=>{
    if(!s.lat||!s.lng) return false;
    if(!activeOps.has(s.operator)) return false;
    if(!activeTypes.has(s.station_type)) return false;
    if(s.station_date&&new Date(s.station_date)>cutoff) return false;
    return true;
  });
}

function updateBadge(filtered){
  const bounds=map.getBounds();
  const vis=filtered.filter(s=>bounds.contains([s.lat,s.lng]));
  const dc=vis.filter(s=>s.station_type==='DC').length;
  const ac=vis.filter(s=>s.station_type==='AC').length;
  const acdc=vis.filter(s=>s.station_type==='ACDC').length;
  const parts=[];
  if(dc) parts.push(`DC:${dc}`);
  if(ac) parts.push(`AC:${ac}`);
  if(acdc) parts.push(`ACDC:${acdc}`);
  document.getElementById('map-badge').textContent=parts.join(' · ')||'0';
}

map.on('moveend zoomend',()=>updateBadge(getFiltered()));

function renderMarkers(){
  clusterGroup.clearLayers();
  if(heatLayer){map.removeLayer(heatLayer);heatLayer=null;}
  const filtered=getFiltered();
  if(heatMode){
    const pts=filtered.map(s=>[s.lat,s.lng,1]);
    heatLayer=L.heatLayer(pts,{radius:25,blur:15,maxZoom:12}).addTo(map);
  } else {
    filtered.forEach(s=>{
      const color=OP_COLORS[s.operator]||'#00ff41';
      const m=L.marker([s.lat,s.lng],{icon:makeIcon(color)});
      m.bindPopup(makePopup(s),{maxWidth:260,minWidth:180});
      clusterGroup.addLayer(m);
    });
  }
  updateBadge(filtered);
}

function toggleOp(btn){
  const op=btn.dataset.op;
  const theme=localStorage.getItem('ev_race_theme')||'arcade';
  if(activeOps.has(op)){
    if(activeOps.size===1) return;
    activeOps.delete(op);
    btn.classList.remove('on'); btn.classList.add('inactive');
    if(theme==='arcade'){btn.style.background='transparent';btn.style.color='#1a1a1a';btn.style.borderColor='#1a1a1a';}
  } else {
    activeOps.add(op);
    btn.classList.add('on'); btn.classList.remove('inactive');
    if(theme==='arcade'){btn.style.background=OP_COLORS[op];btn.style.color=OP_DARK.includes(op)?'#003':'#fff';btn.style.borderColor=OP_COLORS[op];}
  }
  renderMarkers();
}

function toggleType(btn){
  const t=btn.dataset.type;
  if(activeTypes.has(t)){if(activeTypes.size===1) return; activeTypes.delete(t); btn.classList.remove('on');}
  else {activeTypes.add(t); btn.classList.add('on');}
  renderMarkers();
}

function toggleHeat(){
  heatMode=!heatMode;
  document.getElementById('heatBtn').classList.toggle('on',heatMode);
  renderMarkers();
}

function resetFilters(){
  const theme=localStorage.getItem('ev_race_theme')||'arcade';
  activeOps.clear(); Object.keys(OP_COLORS).forEach(op=>activeOps.add(op));
  document.querySelectorAll('.map-op-btn').forEach(b=>{
    b.classList.add('on'); b.classList.remove('inactive');
    if(theme==='arcade'){const op=b.dataset.op;b.style.background=OP_COLORS[op];b.style.color=OP_DARK.includes(op)?'#003':'#fff';b.style.borderColor=OP_COLORS[op];}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });
  activeTypes.clear(); ['DC','AC','ACDC'].forEach(t=>activeTypes.add(t));
  document.querySelectorAll('.map-type-btn').forEach(b=>b.classList.add('on'));
  sliderMonth=11; document.getElementById('time-slider').value=11;
  document.getElementById('slider-label').textContent='ЯНВ';
  if(playInterval){clearInterval(playInterval);playInterval=null;const pb=document.getElementById('playBtn');pb.innerHTML='&#x25BA;';pb.classList.remove('playing');}
  heatMode=false; document.getElementById('heatBtn').classList.remove('on');
  renderMarkers();
}

function onSlider(val){
  sliderMonth=parseInt(val);
  document.getElementById('slider-label').textContent=MONTHS[sliderMonth];
  renderMarkers();
}

function togglePlay(){
  const btn=document.getElementById('playBtn');
  if(playInterval){clearInterval(playInterval);playInterval=null;btn.innerHTML='&#x25BA;';btn.classList.remove('playing');return;}
  sliderMonth=0; document.getElementById('time-slider').value=0;
  document.getElementById('slider-label').textContent=MONTHS[0];
  renderMarkers(); btn.innerHTML='&#x25A0;'; btn.classList.add('playing');
  playInterval=setInterval(()=>{
    if(sliderMonth>=11){clearInterval(playInterval);playInterval=null;btn.innerHTML='&#x25BA;';btn.classList.remove('playing');return;}
    sliderMonth++; document.getElementById('time-slider').value=sliderMonth;
    document.getElementById('slider-label').textContent=MONTHS[sliderMonth];
    renderMarkers();
  },800);
}

function locateMe(){
  if(!navigator.geolocation){alert('Геолокация недоступна');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    if(geoMarker) map.removeLayer(geoMarker);
    geoMarker=L.marker([lat,lng],{icon:L.divIcon({html:'<div class="geo-pulse"></div>',className:'',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(map).bindPopup('Вы здесь').openPopup();
    map.setView([lat,lng],13);
  },()=>alert('Не удалось определить местоположение'));
}

function setTheme(theme){
  document.getElementById('theme-css').href=`CSS/${theme}.css?v=2`;
  localStorage.setItem('ev_race_theme',theme);
  ['arcade','tesla-light','tesla-dark'].forEach(t=>document.getElementById('btn-'+t)?.classList.toggle('active',t===theme));
  document.body.className=document.body.className.replace(/theme-\S+/g,'').trim();
  document.body.classList.add('theme-'+theme);
  tileLayer.setUrl(TILES[theme]||TILES['arcade']);
  document.querySelectorAll('.map-op-btn').forEach(btn=>{
    const op=btn.dataset.op; const isOn=btn.classList.contains('on');
    if(theme==='arcade'){
      if(isOn){btn.style.background=OP_COLORS[op];btn.style.color=OP_DARK.includes(op)?'#003':'#fff';btn.style.borderColor=OP_COLORS[op];}
      else{btn.style.background='transparent';btn.style.color='#1a1a1a';btn.style.borderColor='#1a1a1a';}
    } else {btn.style.background='';btn.style.color='';btn.style.borderColor='';}
  });
}

function toggleBurger(){document.getElementById('mobileMenu').classList.toggle('open');document.getElementById('burgerBtn').classList.toggle('open');}
function closeBurger(){document.getElementById('mobileMenu').classList.remove('open');document.getElementById('burgerBtn').classList.remove('open');}

async function loadStations(){
  try{
    const res=await fetch(SURL+'/rest/v1/stations?select=operator,station_type,city,address,dc_power,ac_power,gun1_type,gun2_type,gun3_type,station_date,lat,lng&lat=not.is.null',{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
    if(!res.ok){console.error('Supabase:',res.status);return;}
    const data=await res.json();
    if(!Array.isArray(data)){console.error('Not array:',data);return;}
    allStations=data; renderMarkers();
  }catch(e){console.error('Load:',e);}
}

async function trackVisit(){
  try{await fetch(SURL+'/rest/v1/visits',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({visited_at:new Date().toISOString(),page:'map'})});}catch(e){}
}

(function init(){
  const saved=localStorage.getItem('ev_race_theme')||'arcade';
  setTheme(saved); loadStations(); trackVisit();
})();
</script>
</body>
</html>
