map.addLayer(clusterGroup);

function makeIcon(color){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="22" viewBox="0 0 16 22"><path d="M8 0C3.6 0 0 3.6 0 8c0 6.3 8 14 8 14s8-7.7 8-14C16 3.6 12.4 0 8 0z" fill="${color}" stroke="#fff" stroke-width="1.2"/><circle cx="8" cy="8" r="3" fill="#fff" fill-opacity=".85"/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[16,22],iconAnchor:[8,22],popupAnchor:[0,-24]});
}

const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function buildRoute(lat,lng,name){
  if(/iPad|iPhone|iPod/.test(navigator.userAgent))window.open(`maps://maps.apple.com/?daddr=${lat},${lng}`);
  else window.open(`geo:${lat},${lng}?q=${lat},${lng}(${encodeURIComponent(name)})`);
}

function groupByCoords(stations){
  const g={};
  stations.forEach(s=>{const k=`${s.lat.toFixed(5)},${s.lng.toFixed(5)}`;if(!g[k])g[k]=[];g[k].push(s);});
  return g;
}

function makePopup(stations){
  const first=stations[0];
  const color=OP_COLORS[first.operator]||'#00ff41';
  const opName=OP_NAMES[first.operator]||first.operator;
  const addr=[first.city,first.address].filter(Boolean).join(', ');
  let html='',totalDC=0,totalAC=0,totalCount=0;
  stations.forEach(s=>{
    const cnt=s.count||1;
    totalCount+=cnt;
    const dc=s.dc_power?`DC ${s.dc_power} кВт${cnt>1?` ×${cnt}`:''}`:'' ;
    const ac=s.ac_power?`AC ${s.ac_power} кВт${cnt>1?` ×${cnt}`:''}`:'' ;
    const pwr=[dc,ac].filter(Boolean).join(' · ')||'—';
    const guns=[s.gun1_type,s.gun2_type,s.gun3_type].filter(Boolean).join(' · ')||'—';
    const date=s.station_date?s.station_date.slice(0,10).split('-').reverse().join('.'):'';
    if(s.dc_power)totalDC+=s.dc_power*cnt;
    if(s.ac_power)totalAC+=s.ac_power*cnt;
    html+=`<div class="popup-station"><div class="popup-row">&#x26A1; <span>${pwr}</span></div><div class="popup-row">&#x1F50C; <span>${guns}</span></div>${date?`<div class="popup-row">&#x1F4C5; <span>${date}</span></div>`:''}</div>`;
  });
  const totalPwr=[];
  if(totalDC)totalPwr.push(`DC ${totalDC} кВт`);
  if(totalAC)totalPwr.push(`AC ${totalAC} кВт`);
  const totalStr=totalCount>1?`<div class="popup-total">&#x2211; ${totalCount} станции · ${totalPwr.join(' · ')}</div>`:'';
  const btn=isMobile?`<button class="popup-route-btn" style="background:${color}" onclick="buildRoute(${first.lat},${first.lng},'${opName.replace(/'/g,"\\'")}')">&#x25BA; МАРШРУТ</button>`:'';
  return `<div class="popup-wrap"><div class="popup-op" style="color:${color}">${opName}</div><div class="popup-row">&#x1F4CD; <span>${addr}</span></div>${html}${totalStr}${btn}</div>`;
}

function getFiltered(){
  const cutoff=weekToDate(sliderWeek);
  return allStations.filter(s=>{
    if(!s.lat||!s.lng)return false;
    if(activeOp&&s.operator!==activeOp)return false;
    if(activeType&&s.station_type!==activeType)return false;
    if(s.station_date&&new Date(s.station_date)>cutoff)return false;
    return true;
  });
}

function updateBadge(filtered){
  const bounds=map.getBounds();
  const vis=filtered.filter(s=>bounds.contains([s.lat,s.lng]));
  const dc=vis.filter(s=>s.station_type==='DC').length;
  const ac=vis.filter(s=>s.station_type==='AC').length;
  const acdc=vis.filter(s=>s.station_type==='ACDC').length;
  const parts=[];
  if(dc)parts.push(`DC:${dc}`);
  if(ac)parts.push(`AC:${ac}`);
  if(acdc)parts.push(`ACDC:${acdc}`);
  document.getElementById('map-badge').textContent=parts.join(' · ')||'0';
}

function updateResetBtn(){
  const has=activeOp!==null||activeType!==null||activeMonth!==null;
  document.getElementById('resetBtn').style.display=has?'inline-block':'none';
}

map.on('moveend zoomend',()=>updateBadge(getFiltered()));

function renderMarkers(){
  clusterGroup.clearLayers();
  if(heatLayer){map.removeLayer(heatLayer);heatLayer=null;}
  const filtered=getFiltered();
  if(heatMode){
    heatLayer=L.heatLayer(filtered.map(s=>[s.lat,s.lng,1]),{radius:25,blur:15,maxZoom:12}).addTo(map);
  } else {
    const groups=groupByCoords(filtered);
    Object.values(groups).forEach(group=>{
      const color=OP_COLORS[group[0].operator]||'#00ff41';
      const m=L.marker([group[0].lat,group[0].lng],{icon:makeIcon(color)});
      m.bindPopup(makePopup(group),{maxWidth:300,minWidth:200});
      clusterGroup.addLayer(m);
    });
  }
  updateBadge(filtered);
  updateResetBtn();
}

// Тип — радиокнопка
function toggleType(btn){
  const t=btn.dataset.type;
  if(activeType===t){activeType=null;btn.classList.remove('on');}
  else{
    if(activeType){const p=document.querySelector(`.op-filter-btn[data-type="${activeType}"]`);if(p)p.classList.remove('on');}
    activeType=t;btn.classList.add('on');
  }
  renderMarkers();
}

// Оператор — радиокнопка
function toggleOp(btn){
  const op=btn.dataset.op;
  if(activeOp===op){activeOp=null;btn.classList.remove('on');}
  else{
    if(activeOp){const p=document.querySelector(`.op-filter-btn[data-op="${activeOp}"]`);if(p)p.classList.remove('on');}
    activeOp=op;btn.classList.add('on');
  }
  renderMarkers();
}

function toggleHeat(){
  heatMode=!heatMode;
  document.getElementById('heatBtn').classList.toggle('on',heatMode);
  renderMarkers();
}

function buildMonthButtons(){
  const row=document.getElementById('month-row');
  const counts={};
  for(let m=0;m<=CUR_MONTH;m++)counts[m]=0;
  allStations.forEach(s=>{
    if(!s.station_date)return;
    const m=new Date(s.station_date).getMonth();
    if(m<=CUR_MONTH)counts[m]=(counts[m]||0)+(s.count||1);
  });
  row.innerHTML='';
  for(let m=0;m<=CUR_MONTH;m++){
    const btn=document.createElement('button');
    btn.className='month-btn';
    btn.dataset.month=m;
    btn.textContent=`${MONTH_NAMES[m]} | ${counts[m]||0}`;
    btn.onclick=()=>selectMonth(btn,m);
    row.appendChild(btn);
  }
}

function selectMonth(btn,m){
  if(activeMonth===m){
    activeMonth=null;btn.classList.remove('on');
    sliderWeek=TOTAL_WEEKS-1;
    document.getElementById('time-slider').value=TOTAL_WEEKS-1;
    document.getElementById('slider-label').textContent='ЯНВ';
  } else {
    activeMonth=m;
    document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    sliderWeek=monthToWeek(m);
    document.getElementById('time-slider').value=sliderWeek;
    document.getElementById('slider-label').textContent=MONTH_NAMES[m];
  }
  renderMarkers();
}

function resetFilters(){
  activeOp=null;activeType=null;activeMonth=null;
  document.querySelectorAll('.op-filter-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('on'));
  sliderWeek=TOTAL_WEEKS-1;
  document.getElementById('time-slider').value=TOTAL_WEEKS-1;
  document.getElementById('slider-label').textContent='ЯНВ';
  if(playInterval){clearInterval(playInterval);playInterval=null;const pb=document.getElementById('playBtn');pb.innerHTML='&#x25BA;';pb.classList.remove('playing');}
  heatMode=false;document.getElementById('heatBtn').classList.remove('on');
  renderMarkers();
}

function onSlider(val){
  sliderWeek=parseInt(val);
  const m=Math.floor(sliderWeek/4);
  document.getElementById('slider-label').textContent=weekLabel(sliderWeek);
  if(activeMonth!==null&&Math.floor(monthToWeek(activeMonth)/4)!==m){
    activeMonth=null;
    document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('on'));
  }
  renderMarkers();
}

function togglePlay(){
  const btn=document.getElementById('playBtn');
  if(playInterval){clearInterval(playInterval);playInterval=null;btn.innerHTML='&#x25BA;';btn.classList.remove('playing');return;}
  sliderWeek=0;document.getElementById('time-slider').value=0;
  document.getElementById('slider-label').textContent=weekLabel(0);
  renderMarkers();btn.innerHTML='&#x25A0;';btn.classList.add('playing');
  playInterval=setInterval(()=>{
    if(sliderWeek>=TOTAL_WEEKS-1){clearInterval(playInterval);playInterval=null;btn.innerHTML='&#x25BA;';btn.classList.remove('playing');return;}
    sliderWeek++;document.getElementById('time-slider').value=sliderWeek;
    document.getElementById('slider-label').textContent=weekLabel(sliderWeek);
    renderMarkers();
  },600);
}

function locateMe(){
  if(!navigator.geolocation){alert('Геолокация недоступна');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    if(geoMarker)map.removeLayer(geoMarker);
    geoMarker=L.marker([lat,lng],{icon:L.divIcon({html:'<div class="geo-pulse"></div>',className:'',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(map).bindPopup('Вы здесь').openPopup();
    map.setView([lat,lng],13);
  },()=>alert('Не удалось определить местоположение'));
}

function setTheme(theme){
  document.getElementById('theme-css').href=`CSS/${theme}.css?v=2`;
  localStorage.setItem('ev_race_theme',theme);
  ['arcade','tesla-light','tesla-dark'].forEach(t=>document.getElementById('btn-'+t)?.classList.toggle('active',t===theme));
  document.body.className=document.body.className.replace(/theme-\S+/g,'').trim();
  document.body.classList.add('theme-'+theme);
  tileLayer.setUrl(TILES[theme]||TILES['arcade']);
}

function toggleBurger(){document.getElementById('mobileMenu').classList.toggle('open');document.getElementById('burgerBtn').classList.toggle('open');}
function closeBurger(){document.getElementById('mobileMenu').classList.remove('open');document.getElementById('burgerBtn').classList.remove('open');}

async function loadStations(){
  try{
    const res=await fetch(SURL+'/rest/v1/stations?select=operator,station_type,city,address,count,dc_power,ac_power,gun1_type,gun2_type,gun3_type,station_date,lat,lng&lat=not.is.null',{headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}});
    if(!res.ok){console.error('Supabase:',res.status);return;}
    const data=await res.json();
    if(!Array.isArray(data)){console.error('Not array:',data);return;}
    allStations=data;buildMonthButtons();renderMarkers();
  }catch(e){console.error('Load:',e);}
}

async function trackVisit(){
  try{await fetch(SURL+'/rest/v1/visits',{method:'POST',headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({visited_at:new Date().toISOString(),page:'map'})});}catch(e){}
}

(function init(){
  const saved=localStorage.getItem('ev_race_theme')||'arcade';
  setTheme(saved);loadStations();trackVisit();
})();
</script>
</body>
