<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const SURL = 'https://uvrboxrddqlasgrnnnne.supabase.co';
const SKEY = 'sb_publishable_Tmx9z-PHntDW4cZQrhOTHQ_1R1Bns7Y';

const OP_NAMES = {
  batteryfly:'BatteryFly', forevo:'forEVo', zaryadka:'Zaryadka',
  united:'United Company', csms:'Гродн. ЦСМС',
  malanka:'Malanka', evika:'Evika!', orange:'Orange', prizma:'Prizma'
};
const OP_COLORS = {
  batteryfly:'#005EEB', forevo:'#b44fff', zaryadka:'#00cfff',
  united:'#F5821F', csms:'#FF6B6B',
  malanka:'#76d275', evika:'#832af5', orange:'#FF6B00', prizma:'#24c3d3'
};

// ── ТАЙЛЫ ПО ТЕМЕ ──
const TILE_URLS = {
  'arcade':      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  'tesla-light': 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  'tesla-dark':  'https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png'
};
const TILE_ATTR = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>';

// ── СОСТОЯНИЕ ФИЛЬТРОВ ──
const activeOps   = new Set(Object.keys(OP_NAMES));
const activeTypes = new Set(['DC','AC','ACDC']);
let   activeCity  = null;
let   allStations = [];
let   geoMarker   = null;

// ── КАРТА ──
const map = L.map('map', {
  center: [53.7, 28.0],
  zoom: 7,
  zoomControl: true,
  scrollWheelZoom: true
});

let tileLayer = L.tileLayer(TILE_URLS['arcade'], {
  attribution: TILE_ATTR,
  maxZoom: 19
}).addTo(map);

const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true
});
map.addLayer(clusterGroup);

// ── МАРКЕР SVG ──
function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="24" viewBox="0 0 18 24">
    <path d="M9 0C4 0 0 4 0 9c0 7 9 15 9 15s9-8 9-15C18 4 14 0 9 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/>
    <circle cx="9" cy="9" r="3.5" fill="#fff" fill-opacity="0.85"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [18, 24],
    iconAnchor: [9, 24],
    popupAnchor: [0, -26]
  });
}

// ── МОБИЛЕ ОПРЕДЕЛЕНИЕ ──
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// ── МАРШРУТ ──
function buildRoute(lat, lng, name) {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const label = encodeURIComponent(name);
  if (isIOS) {
    window.open(`maps://maps.apple.com/?daddr=${lat},${lng}&daddr=${label}`);
  } else {
    window.open(`geo:${lat},${lng}?q=${lat},${lng}(${label})`);
  }
}

// ── ПОПАП ──
function makePopup(s) {
  const color  = OP_COLORS[s.operator] || '#00ff41';
  const opName = OP_NAMES[s.operator]  || s.operator;
  const dc  = s.dc_power  ? `DC ${s.dc_power} кВт`  : '';
  const ac  = s.ac_power  ? `AC ${s.ac_power} кВт`  : '';
  const pwr = [dc, ac].filter(Boolean).join(' · ') || '—';
  const guns = [s.gun1_type, s.gun2_type, s.gun3_type].filter(Boolean).join(' · ') || '—';
  const date = s.station_date ? s.station_date.slice(0,10).split('-').reverse().join('.') : '—';
  const addr = [s.city, s.address].filter(Boolean).join(', ');

  const routeBtn = isMobile
    ? `<button class="popup-route-btn" style="background:${color}" onclick="buildRoute(${s.lat},${s.lng},'${opName.replace(/'/g,"\\'")}')">▶ МАРШРУТ</button>`
    : '';

  return `<div class="popup-wrap">
    <div class="popup-op" style="color:${color}">${opName}</div>
    <div class="popup-row">📍 <span>${addr}</span></div>
    <div class="popup-row">⚡ <span>${pwr}</span></div>
    <div class="popup-row">🔌 <span>${guns}</span></div>
    <div class="popup-row">📅 <span>${date}</span></div>
    ${routeBtn}
  </div>`;
}

// ── РЕНДЕР МАРКЕРОВ ──
function renderMarkers() {
  clusterGroup.clearLayers();
  const filtered = allStations.filter(s => {
    if (!s.lat || !s.lng) return false;
    if (!activeOps.has(s.operator)) return false;
    if (!activeTypes.has(s.station_type)) return false;
    if (activeCity && s.city !== activeCity) return false;
    return true;
  });

  filtered.forEach(s => {
    const color  = OP_COLORS[s.operator] || '#00ff41';
    const marker = L.marker([s.lat, s.lng], { icon: makeIcon(color) });
    marker.bindPopup(makePopup(s), { maxWidth: 260, minWidth: 180 });
    clusterGroup.addLayer(marker);
  });

  document.getElementById('mf-count').textContent = filtered.length;
}

// ── ФИЛЬТРЫ: ОПЕРАТОРЫ ──
function toggleOp(btn) {
  const op = btn.dataset.op;
  if (activeOps.has(op)) {
    if (activeOps.size === 1) return; // хотя бы один всегда активен
    activeOps.delete(op);
    btn.classList.add('inactive');
  } else {
    activeOps.add(op);
    btn.classList.remove('inactive');
  }
  renderMarkers();
}

// ── ФИЛЬТРЫ: ТИП ──
function toggleType(btn) {
  const t = btn.dataset.type;
  if (activeTypes.has(t)) {
    if (activeTypes.size === 1) return;
    activeTypes.delete(t);
    btn.classList.remove('active-type');
  } else {
    activeTypes.add(t);
    btn.classList.add('active-type');
  }
  renderMarkers();
}

// ── ФИЛЬТРЫ: ГОРОД ──
function setCity(city, btn) {
  document.querySelectorAll('.mf-city').forEach(b => b.classList.remove('active-city'));
  if (activeCity === city) {
    activeCity = null;
  } else {
    activeCity = city;
    btn.classList.add('active-city');
  }
  renderMarkers();
}

function buildCityFilter(stations) {
  const cities = [...new Set(stations.map(s => s.city).filter(Boolean))].sort();
  const wrap = document.getElementById('city-scroll');
  wrap.innerHTML = cities.map(c =>
    `<button class="mf-btn mf-city" onclick="setCity('${c}',this)">${c}</button>`
  ).join('');
}

// ── СБРОС ──
function resetFilters() {
  activeOps.clear();
  Object.keys(OP_NAMES).forEach(op => activeOps.add(op));
  document.querySelectorAll('.mf-btn[data-op]').forEach(b => b.classList.remove('inactive'));

  activeTypes.clear();
  ['DC','AC','ACDC'].forEach(t => activeTypes.add(t));
  document.querySelectorAll('.mf-type').forEach(b => b.classList.remove('active-type'));

  activeCity = null;
  document.querySelectorAll('.mf-city').forEach(b => b.classList.remove('active-city'));

  renderMarkers();
}

// ── ГЕОЛОКАЦИЯ ──
function locateMe() {
  if (!navigator.geolocation) { alert('Геолокация недоступна в вашем браузере'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;

    if (geoMarker) map.removeLayer(geoMarker);
    geoMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        html: '<div class="geo-pulse"></div>',
        className: '',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      })
    }).addTo(map).bindPopup('Вы здесь').openPopup();

    map.setView([lat, lng], 13);
  }, () => {
    alert('Не удалось определить местоположение');
  });
}

// ── ТЕМА ──
function setTheme(theme) {
  document.getElementById('theme-css').href = `CSS/${theme}.css?v=2`;
  localStorage.setItem('ev_race_theme', theme);

  // Кнопки статус-бара
  ['arcade','tesla-light','tesla-dark'].forEach(t => {
    document.getElementById('btn-' + t)?.classList.toggle('active', t === theme);
  });

  // Тело — класс для CSS переопределений фильтров и попапов
  document.body.className = document.body.className
    .replace(/theme-\S+/g, '').trim();
  document.body.classList.add('theme-' + theme);

  // Тайлы карты
  tileLayer.setUrl(TILE_URLS[theme] || TILE_URLS['arcade']);
}

// ── БУРГЕР ──
function toggleBurger() {
  document.getElementById('mobileMenu').classList.toggle('open');
  document.getElementById('burgerBtn').classList.toggle('active');
}
function closeBurger() {
  document.getElementById('mobileMenu').classList.remove('open');
  document.getElementById('burgerBtn').classList.remove('active');
}

// ── ЗАГРУЗКА ДАННЫХ ──
async function loadStations() {
  try {
    const res = await fetch(
      SURL + '/rest/v1/stations?select=operator,station_type,city,address,location_name,dc_power,ac_power,gun1_type,gun2_type,gun3_type,station_date,lat,lng&not.lat.is=null&order=station_date.desc',
      { headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + SKEY } }
    );
    allStations = await res.json();
    buildCityFilter(allStations);
    renderMarkers();
  } catch(e) {
    console.error('Ошибка загрузки:', e);
    document.getElementById('mf-count').textContent = 'ERR';
  }
}

// ── ТРЕКИНГ ВИЗИТА ──
async function trackVisit() {
  try {
    await fetch(SURL + '/rest/v1/visits', {
      method: 'POST',
      headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + SKEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ visited_at: new Date().toISOString(), page: 'map' })
    });
  } catch(e) {}
}

// ── ИНИТ ──
(function init() {
  const saved = localStorage.getItem('ev_race_theme') || 'arcade';
  setTheme(saved);
  loadStations();
  trackVisit();
})();
</script>
